<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tester Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== THEME ===== */
:root{
  --bg:#0f172a;
  --card:#020617;
  --text:#fff;
  --accent:#00eaff;
}
body.light{
  --bg:#f1f5f9;
  --card:#fff;
  --text:#000;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  display:flex;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100vh;
  background:var(--card);
  padding:20px;
  position:fixed;
}
.sidebar h2{color:var(--accent);margin-bottom:20px;}
.sidebar a{
  display:block;
  padding:12px;
  color:var(--text);
  text-decoration:none;
  margin-bottom:10px;
  border-radius:8px;
}
.sidebar a:hover{
  background:var(--accent);
  color:#000;
}

/* MAIN */
.main{
  margin-left:250px;
  width:100%;
  padding:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}
.top-actions{
  display:flex;
  align-items:center;
  gap:15px;
}
.toggle{
  cursor:pointer;
  color:var(--accent);
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:10px;
}
.profile img{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid var(--accent);
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:20px;
}
.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* CHARTS */
.charts{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-bottom:20px;
}
.chart-box{
  background:var(--card);
  padding:15px;
  border-radius:10px;
}
canvas{
  width:100% !important;
  max-height:280px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

/* TABLE */
.table-container{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  overflow-x:auto;
}
table{
  width:100%;
  min-width:700px;
}
th,td{padding:10px;}
th{color:var(--accent);}

/* ACTIVITY */
.activity{
  background:var(--card);
  padding:15px;
  border-radius:10px;
}
.activity p{
  font-size:14px;
  margin-bottom:10px;
}

/* BADGE */
.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}
.open{background:#facc15;color:#000;}
.closed{background:#22c55e;color:#000;}
.pending{background:#3b82f6;}

/* BUTTON */
.btn{
  padding:5px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:var(--accent);
  margin-right:5px;
}

/* RESPONSIVE */
@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}
@media(max-width:768px){
  .sidebar{width:70px;}
  .sidebar h2{display:none;}
  .main{margin-left:70px;}
}
@media(max-width:480px){
  .main{margin-left:0;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Tester</h2>
  <a href="./tester.html"><i class="fa fa-home"></i> Dashboard</a>
  <a href="./my tickets.html"><i class="fa fa-ticket"></i> My Tickets</a>
  <!-- <a href="#"><i class="fa fa-clock"></i> In Progress</a>
  <a href="#"><i class="fa fa-check"></i> Completed</a>
  <a href="#"><i class="fa fa-bell"></i> Notifications</a>
   <a href="#"><i class="fa fa-cog"></i> Settings</a>  -->
  <a href="./login.html"><i class="fa fa-sign-out"></i> Logout</a> 
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h2>Tester Dashboard</h2>

    <div class="top-actions">
      <i class="fa fa-moon toggle" onclick="toggleTheme()"></i>

      <div class="profile">
        <img src="./ava1.webp">
        <div>
          <div>tester@gmail.com</div>
          <small>TESTER</small>
        </div>
      </div>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card"><h3 id="total">0</h3><p>My Tickets</p></div>
    <div class="card"><h3 id="open">0</h3><p>Open</p></div>
    <div class="card"><h3 id="pending">0</h3><p>Pending</p></div>
    <div class="card"><h3 id="closed">0</h3><p>Closed</p></div>
  </div>

  <!-- CHARTS -->
  <div class="charts">
    <div class="chart-box">
      <h3>Status Overview</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Priority Split</h3>
      <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-box">
      <h3>Ticket Distribution</h3>
      <canvas id="donutChart"></canvas>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- TABLE -->
    <div class="table-container">
      <h3>Assigned Tickets</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Issue</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- ACTIVITY -->
    <div class="activity">
      <h3>Recent Activity</h3>
      <div id="activityLog"></div>
    </div>

  </div>

</div>

<script>

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* DATA */
let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
let userEmail = "tester@gmail.com";

let myTickets = tickets.filter(t => t.assignedTo === userEmail);

/* COUNTS */
let open = myTickets.filter(t=>t.status==="Open").length;
let closed = myTickets.filter(t=>t.status==="Closed").length;
let pending = myTickets.filter(t=>t.status==="Pending").length;

let critical = myTickets.filter(t=>t.priority==="Critical").length;
let medium = myTickets.filter(t=>t.priority==="Medium").length;
let low = myTickets.filter(t=>t.priority==="Low").length;

/* CARDS */
total.innerText = myTickets.length;
document.getElementById("open").innerText = open;
document.getElementById("pending").innerText = pending;
document.getElementById("closed").innerText = closed;

/* TABLE */
function render(){
  let tbody = document.getElementById("tableBody");
  let activity = document.getElementById("activityLog");

  tbody.innerHTML="";
  activity.innerHTML="";

  myTickets.forEach((t,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>#${i+1}</td>
        <td>${t.issue}</td>
        <td><span class="badge ${t.status.toLowerCase()}">${t.status}</span></td>
        <td>
          <button class="btn" onclick="updateStatus(${i},'Open')">Open</button>
          <button class="btn" onclick="updateStatus(${i},'Pending')">Pending</button>
          <button class="btn" onclick="updateStatus(${i},'Closed')">Close</button>
        </td>
      </tr>
    `;

    activity.innerHTML += `<p>${t.issue} → ${t.status}</p>`;
  });
}

/* UPDATE */
function updateStatus(i,status){
  let index = tickets.findIndex(t => t.issue === myTickets[i].issue);
  tickets[index].status = status;
  localStorage.setItem("tickets", JSON.stringify(tickets));
  location.reload();
}

/* CHARTS */
new Chart(barChart,{
  type:"bar",
  data:{
    labels:["Open","Closed","Pending"],
    datasets:[{data:[open,closed,pending]}]
  }
});

new Chart(pieChart,{
  type:"pie",
  data:{
    labels:["Critical","Medium","Low"],
    datasets:[{data:[critical,medium,low]}]
  }
});

new Chart(donutChart,{
  type:"doughnut",
  data:{
    labels:["Open","Closed","Pending"],
    datasets:[{data:[open,closed,pending]}]
  }
});

render();

</script>

</body>
</html>
