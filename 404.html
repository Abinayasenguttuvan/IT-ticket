<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b0f1a;
  color:#fff;
  overflow:hidden;
}

/* BACKGROUND GLOW */
body::before{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(95,92,255,0.4), transparent);
  filter:blur(120px);
  top:-100px;
  left:-100px;
  animation:moveGlow 6s infinite alternate;
}

@keyframes moveGlow{
  0%{transform:translate(0,0);}
  100%{transform:translate(100px,100px);}
}

/* CONTAINER */
.container{
  text-align:center;
  padding:40px;
  border-radius:25px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  max-width:500px;
  width:90%;
  animation:fadeUp 1s ease forwards;
}

/* 404 TEXT */
h1{
  font-size:120px;
  background:linear-gradient(90deg,#5f5cff,#9f7bff);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:10px;
}

/* SUBTEXT */
h2{
  font-size:24px;
  margin-bottom:10px;
}

p{
  font-size:14px;
  opacity:0.8;
  margin-bottom:30px;
}

/* BUTTON */
.btn{
  display:inline-block;
  padding:14px 30px;
  border-radius:30px;
  background:#5f5cff;
  color:#fff;
  text-decoration:none;
  transition:0.3s;
  position:relative;
}

.btn:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 30px rgba(95,92,255,0.5);
}

/* FLOAT ICON */
.icon{
  font-size:40px;
  margin-bottom:15px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{ transform:translateY(0);}
  50%{ transform:translateY(-10px);}
}

/* ANIMATION */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(50px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* RESPONSIVE */
@media(max-width:768px){
  h1{ font-size:80px; }
}

@media(max-width:480px){
  h1{ font-size:60px; }
  h2{ font-size:18px; }
}
</style>
</head>

<body>

<div class="container">
  <div class="icon">⚠️</div>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you’re looking for doesn’t exist or has been moved.</p>

  <a href="index.html" class="btn">Go Back Home</a>
</div>





</body>
</html>
