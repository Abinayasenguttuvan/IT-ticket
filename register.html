<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IT ticketing Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== ROOT ===== */
:root{
  --cyber-primary:#00ff99;
  --cyber-secondary:#0ea5e9;
  --cyber-dark:#020617;
  --cyber-card:rgba(255,255,255,0.05);
  --cyber-border:rgba(255,255,255,0.12);
  --cyber-text:#94a3b8;
}

/* ===== GLOBAL ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at top,#020617,#000);
  overflow:hidden;
  color:#fff;
}

/* ===== BACK BUTTON ===== */
/* ===== BACK BUTTON (CAPSULE STYLE) ===== */
.cyber-back-top{
  position:absolute;
  top:20px;
  left:20px;
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 18px;
  border-radius:50px; /* capsule shape */
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  z-index:10;
  transition:all 0.3s ease;
}

/* ICON STYLE */
.cyber-back-top i{
  font-size:13px;
}

/* HOVER EFFECT */
.cyber-back-top:hover{
  background:linear-gradient(90deg,#00ff99,#0ea5e9);
  color:#000;
  transform:translateX(-5px) scale(1.03);
  box-shadow:0 0 15px rgba(0,255,153,0.6);
}
@media(max-width:600px){
  .cyber-back-top{
    top:12px;
    left:12px;
    padding:8px 14px;
    font-size:12px;
  }
}
/* ===== PARTICLES ===== */
.cyber-bg{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:0;
}

.cyber-bg span{
  position:absolute;
  width:6px;
  height:6px;
  background:var(--cyber-primary);
  border-radius:50%;
  animation:cyberParticle 8s linear infinite;
}

@keyframes cyberParticle{
  0%{transform:translateY(0)}
  100%{transform:translateY(100vh)}
}

/* ===== WRAPPER ===== */
.cyber-wrapper{
  width:100%;
  max-width:780px;
  padding:20px;
  z-index:2;
}

/* ===== CARD ===== */
.cyber-card{
  background:var(--cyber-card);
  border:1px solid var(--cyber-border);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:35px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* LOGO */
.cyber-logo{
  text-align:center;
}

.cyber-logo img{
  height:55px;
}

/* ICON */
.cyber-icon{
  width:70px;
  height:70px;
  margin:15px auto;
  border-radius:50%;
  background:linear-gradient(135deg,var(--cyber-primary),var(--cyber-secondary));
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}

/* TITLE */
.cyber-title{
  text-align:center;
  font-size:26px;
  margin-bottom:5px;
}

.cyber-sub{
  text-align:center;
  color:var(--cyber-text);
  margin-bottom:25px;
  font-size:13px;
}

/* GRID */
.cyber-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* INPUT */
.cyber-group{
  margin-bottom:18px;
}

.cyber-group label{
  font-size:13px;
  margin-bottom:6px;
  display:block;
}

.cyber-input{
  display:flex;
  align-items:center;
  border:1px solid var(--cyber-border);
  border-radius:10px;
  height:46px;
  padding:0 12px;
  background:rgba(0,0,0,0.4);
}

.cyber-input i{
  margin-right:8px;
  color:#94a3b8;
}

/* FIXED DROPDOWN */
.cyber-input select{
  background:#020617;
  color:#fff;
  border:none;
  outline:none;
  width:100%;
  cursor:pointer;
}

.cyber-input select option{
  background:#020617;
  color:#fff;
}

/* INPUT TEXT */
.cyber-input input{
  border:none;
  outline:none;
  background:transparent;
  color:#fff;
  width:100%;
}

/* PASSWORD */
.cyber-pass{
  position:relative;
}

.cyber-pass span{
  position:absolute;
  right:10px;
  cursor:pointer;
}

/* ERROR */
.cyber-error{
  color:#ff4d4d;
  font-size:11px;
  display:none;
}

/* BUTTON */
.cyber-btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,var(--cyber-primary),var(--cyber-secondary));
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.cyber-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px var(--cyber-primary);
}

/* LINK */
.cyber-link{
  text-align:center;
  margin-top:15px;
  font-size:13px;
}

.cyber-link a{
  color:var(--cyber-primary);
}

/* RESPONSIVE */
@media(max-width:900px){
  .cyber-grid{
    grid-template-columns:1fr;
  }
}

@media(max-width:600px){
  .cyber-card{
    padding:25px 18px;
  }
  .cyber-title{
    font-size:22px;
  }
  .cyber-back-top{
    top:10px;
    left:10px;
    font-size:12px;
    padding:8px 12px;
  }
}

</style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="index.html" class="cyber-back-top">
  <i class="fa-solid fa-arrow-left"></i> Back to Home
</a>

<!-- PARTICLES -->
<div class="cyber-bg">
<span style="left:10%"></span>
<span style="left:30%"></span>
<span style="left:50%"></span>
<span style="left:70%"></span>
<span style="left:90%"></span>
</div>

<div class="cyber-wrapper">

<div class="cyber-card">

<div class="cyber-logo">
<img src="./logo.webp">
</div>

<div class="cyber-icon">
<i class="fa-solid fa-shield-halved"></i>
</div>

<h2 class="cyber-title">Create IT Service Account</h2>
<p class="cyber-sub">Join our secure platform</p>

<form id="cyberRegForm">

<div class="cyber-grid">

<div class="cyber-group">
<label>Full Name</label>
<div class="cyber-input">
<i class="fa fa-user"></i>
<input type="text" required>
</div>
</div>

<div class="cyber-group">
<label>Role</label>
<div class="cyber-input">
<select required>
<option value="admin">Admin</option>
<option value="tester">Tester</option>
</select>
</div>
</div>

</div>

<div class="cyber-group">
<label>Email</label>
<div class="cyber-input">
<i class="fa fa-envelope"></i>
<input type="email" id="email" required>
</div>
<p id="emailErr" class="cyber-error">Invalid email</p>
</div>

<div class="cyber-grid">

<div class="cyber-group">
<label>Password</label>
<div class="cyber-input cyber-pass">
<input type="password" id="pass" required>
<span onclick="togglePass('pass')"><i class="fa fa-eye"></i></span>
</div>
<p id="passErr" class="cyber-error">Weak password</p>
</div>

<div class="cyber-group">
<label>Confirm</label>
<div class="cyber-input cyber-pass">
<input type="password" id="confirm" required>
<span onclick="togglePass('confirm')"><i class="fa fa-eye"></i></span>
</div>
<p id="confirmErr" class="cyber-error">Passwords do not match</p>
</div>

</div>

<div style="margin:10px 0;">
<input type="checkbox" required> Accept terms & policy
</div>

<button class="cyber-btn">Create Account</button>

<div class="cyber-link">
Already have an account? <a href="login.html">Login</a>
</div>

</form>

</div>
</div>

<script>
function togglePass(id){
  const el = document.getElementById(id);
  el.type = el.type === "password" ? "text" : "password";
}

document.getElementById("cyberRegForm").addEventListener("submit",(e)=>{
  e.preventDefault();
  window.location.href="login.html";
});
</script>

</body>
</html>
