<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users - Admin</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== THEME ===== */
:root{
  --bg:#0f172a;
  --card:#020617;
  --text:#fff;
  --accent:#00eaff;
}
body.light{
  --bg:#f1f5f9;
  --card:#fff;
  --text:#000;
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
  display:flex;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */
.sidebar{
  width:250px;
  height:100vh;
  background:var(--card);
  padding:20px;
  position:fixed;
}

.sidebar h2{color:var(--accent);margin-bottom:20px;}

.sidebar a{
  display:block;
  padding:12px;
  color:var(--text);
  text-decoration:none;
  margin-bottom:10px;
  border-radius:8px;
}

.sidebar a:hover{
  background:var(--accent);
  color:#000;
}

/* MAIN */
.main{
  margin-left:250px;
  width:100%;
  padding:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.top-actions{
  display:flex;
  align-items:center;
  gap:15px;
}

.toggle{
  cursor:pointer;
  color:var(--accent);
}

/* PROFILE */
.profile{
  display:flex;
  align-items:center;
  gap:10px;
}

.profile img{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid var(--accent);
}

.profile-info{
  font-size:12px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  text-align:center;
}

/* FILTER */
.filter{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

.filter input{
  padding:10px;
  border-radius:8px;
  border:none;
}

/* BUTTON */
.btn{
  padding:10px 15px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* TABLE */
.table-container{
  background:var(--card);
  padding:15px;
  border-radius:10px;
  overflow-x:auto;
}

table{
  width:100%;
  min-width:700px;
}

th,td{
  padding:12px;
}

th{color:var(--accent);}

tr{border-bottom:1px solid rgba(255,255,255,0.1);}

/* BADGE */
.badge{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}
.admin{background:#ef4444;}
.tester{background:#3b82f6;}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:var(--card);
  padding:20px;
  border-radius:10px;
  width:300px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .sidebar{width:70px;}
  .sidebar h2{display:none;}
  .main{margin-left:70px;}
}

@media(max-width:480px){
  .main{margin-left:0;}
  .topbar{flex-direction:column;align-items:flex-start;}
  .filter{flex-direction:column;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin</h2>
  <a href="./admin.html"><i class="fa fa-home"></i> Dashboard</a>
  <a href="./tickets.html"><i class="fa fa-ticket"></i> Tickets</a>
  <a href="./users.html"><i class="fa fa-users"></i> Users</a>
  <a href="./reports.html"><i class="fa fa-chart-line"></i> Reports</a>
  <a href="./login.html"><i class="fa fa-sign-out"></i> Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <h2>Users Management</h2>

    <div class="top-actions">
      <i class="fa fa-moon toggle" onclick="toggleTheme()"></i>

      <div class="profile">
        <img src="./ava1.webp">
        <div class="profile-info">
          <div id="userEmail">Loading...</div>
          <div id="userRole" style="color:var(--accent);"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card"><h3 id="totalUsers">0</h3><p>Total Users</p></div>
    <div class="card"><h3 id="adminCount">0</h3><p>Admins</p></div>
    <div class="card"><h3 id="testerCount">0</h3><p>Testers</p></div>
  </div>

  <!-- FILTER -->
  <div class="filter">
    <input type="text" id="searchUser" placeholder="Search user...">
    <button class="btn" onclick="openModal()">+ Add User</button>
  </div>

  <!-- TABLE -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Role</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userTable"></tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Add User</h3>
    <input id="email" placeholder="Email">
    <select id="role">
      <option value="admin">Admin</option>
      <option value="tester">Tester</option>
    </select>
    <button class="btn" onclick="addUser()">Save</button>
  </div>
</div>

<script>

    /* ===== GET USER DATA ===== */
    let user = null;
    
    try{
      user = JSON.parse(localStorage.getItem("user"));
    }catch(e){}
    
    /* ===== DISPLAY USER ===== */
    if(user && user.email){
      document.getElementById("userEmail").innerText = user.email;
    
      document.getElementById("userRole").innerText =
        (user.role || "").toUpperCase();
    
    }else{
      /* 🔥 FORCE DEMO USER (so it never shows blank) */
      const demo = {
        email: "admin@gmail.com",
        role: "admin"
      };
    
      localStorage.setItem("user", JSON.stringify(demo));
    
      document.getElementById("userEmail").innerText = demo.email;
      document.getElementById("userRole").innerText = demo.role.toUpperCase();
    }
    
    /* ===== THEME ===== */
    function toggleTheme(){
      document.body.classList.toggle("light");
    }
    
    /* ===== USERS DATA ===== */
    let users = JSON.parse(localStorage.getItem("users")) || [];
    
    function render(){
      let table = document.getElementById("userTable");
      table.innerHTML = "";
    
      let search = document.getElementById("searchUser").value.toLowerCase();
    
      let filtered = users.filter(u => 
        u.email.toLowerCase().includes(search)
      );
    
      filtered.forEach((u,i)=>{
        table.innerHTML += `
          <tr>
            <td>${u.email}</td>
            <td><span class="badge ${u.role}">${u.role}</span></td>
            <td><i class="fa fa-trash" onclick="deleteUser(${i})"></i></td>
          </tr>
        `;
      });
    
      document.getElementById("totalUsers").innerText = users.length;
      document.getElementById("adminCount").innerText = users.filter(u=>u.role==="admin").length;
      document.getElementById("testerCount").innerText = users.filter(u=>u.role==="tester").length;
    }
    
    /* ===== ADD USER ===== */
    function addUser(){
      let email = document.getElementById("email").value;
      let role = document.getElementById("role").value;
    
      if(email===""){
        alert("Enter email");
        return;
      }
    
      users.push({email, role});
      localStorage.setItem("users", JSON.stringify(users));
    
      document.getElementById("modal").style.display="none";
      render();
    }
    
    /* ===== DELETE ===== */
    function deleteUser(i){
      users.splice(i,1);
      localStorage.setItem("users", JSON.stringify(users));
      render();
    }
    
    function openModal(){
      document.getElementById("modal").style.display="flex";
    }
    
    /* SEARCH */
    document.getElementById("searchUser").addEventListener("input", render);
    
    /* INIT */
    render();
    
    </script>

</body>
</html>
